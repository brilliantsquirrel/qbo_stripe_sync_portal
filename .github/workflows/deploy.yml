name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  GCP_PROJECT_ID: qbo-stripe-sync-portal
  GCP_REGION: us-central1
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev
  IMAGE_NAME: us-central1-docker.pkg.dev/qbo-stripe-sync-portal/qbo-sync-portal/app
  MIGRATOR_IMAGE: us-central1-docker.pkg.dev/qbo-stripe-sync-portal/qbo-sync-portal/migrator
  CLOUD_RUN_SERVICE: qbo-sync-portal

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Build Docker images
        run: |
          docker build \
            --target runner \
            --tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --tag ${{ env.IMAGE_NAME }}:latest \
            .
          docker build \
            --target migrator \
            --tag ${{ env.MIGRATOR_IMAGE }}:${{ github.sha }} \
            --tag ${{ env.MIGRATOR_IMAGE }}:latest \
            .

      - name: Push Docker images
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.MIGRATOR_IMAGE }}:${{ github.sha }}
          docker push ${{ env.MIGRATOR_IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-secrets="DATABASE_URL=DATABASE_URL:latest,AUTH_SECRET=AUTH_SECRET:latest,FIELD_ENCRYPTION_KEY=FIELD_ENCRYPTION_KEY:latest,QBO_CLIENT_ID=QBO_CLIENT_ID:latest,QBO_CLIENT_SECRET=QBO_CLIENT_SECRET:latest,QBO_WEBHOOK_VERIFIER_TOKEN=QBO_WEBHOOK_VERIFIER_TOKEN:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,STRIPE_CLIENT_ID=STRIPE_CLIENT_ID:latest,STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest,STRIPE_PRICE_STARTER=STRIPE_PRICE_STARTER:latest,STRIPE_PRICE_GROWTH=STRIPE_PRICE_GROWTH:latest,STRIPE_PRICE_PROFESSIONAL=STRIPE_PRICE_PROFESSIONAL:latest,STRIPE_PRICE_ENTERPRISE=STRIPE_PRICE_ENTERPRISE:latest,RESEND_API_KEY=RESEND_API_KEY:latest" \
            --set-env-vars="NODE_ENV=production,GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }},GCP_TASKS_QUEUE=sync-jobs,GCP_TASKS_LOCATION=${{ env.GCP_REGION }}" \
            --service-account="qbo-sync-portal-sa@qbo-stripe-sync-portal.iam.gserviceaccount.com" \
            --min-instances=1 \
            --max-instances=10 \
            --memory=512Mi \
            --cpu=1 \
            --timeout=60 \
            --add-cloudsql-instances=${{ secrets.CLOUD_SQL_INSTANCE_CONNECTION_NAME }}

      - name: Run database migrations
        run: |
          gcloud run jobs create migrate-${{ github.sha }} \
            --image ${{ env.MIGRATOR_IMAGE }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --set-secrets="DATABASE_URL=DATABASE_URL:latest" \
            --set-cloudsql-instances=${{ secrets.CLOUD_SQL_INSTANCE_CONNECTION_NAME }} \
            --service-account="qbo-sync-portal-sa@qbo-stripe-sync-portal.iam.gserviceaccount.com" \
            --memory=512Mi \
            --max-retries=1 \
            --task-timeout=300 || true
          gcloud run jobs execute migrate-${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --wait
